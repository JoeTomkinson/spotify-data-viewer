name: CLA Check

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize, reopened, closed]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: Require CLA acceptance
        if: >-
          (github.event_name == 'issue_comment' &&
          github.event.issue.pull_request &&
          (github.event.comment.body == 'I have read CLA.md and I hereby sign the CLA.')) ||
          github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-document: ${{ github.server_url }}/${{ github.repository }}/blob/${{ github.event.repository.default_branch }}/CLA.md
          path-to-signatures: signatures/version1/cla.json
          branch: ${{ github.event.repository.default_branch }}
          allowlist: dependabot[bot],github-actions[bot]
          custom-pr-sign-comment: I have read CLA.md and I hereby sign the CLA.
          custom-notsigned-prcomment: >-
            Thank you for your contribution. This repository requires a signed CLA before a pull request can be merged.
            Please review CLA.md and reply on this pull request with the exact text:
            `I have read CLA.md and I hereby sign the CLA.`
          custom-allsigned-prcomment: All contributors have signed the CLA.
          lock-pullrequest-aftermerge: true
          suggest-recheck: true